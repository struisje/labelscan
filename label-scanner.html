<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Label Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="zxing_reader.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap');
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;
    --accent:#e8ff47; --accent2:#47ffe8; --text:#f0f0f0; --muted:#666;
    --danger:#ff4747; --success:#47ff8a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:12px}
  header h1{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent)}
  header span{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
  .main{flex:1;display:flex;flex-direction:column;padding:16px;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-hdr span{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}
  .dot.on{background:var(--success);box-shadow:0 0 8px var(--success)}
  .dot.blink{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
  #vc{position:relative;width:100%;aspect-ratio:4/3;background:#000;display:none}
  #vc.on{display:block}
  #video{width:100%;height:100%;object-fit:cover}
  #cv{display:none}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .frame{width:220px;height:220px;position:relative}
  .frame::before,.frame::after,.frame span::before,.frame span::after{content:'';position:absolute;width:32px;height:32px;border-color:var(--accent);border-style:solid}
  .frame::before{top:0;left:0;border-width:3px 0 0 3px}
  .frame::after{top:0;right:0;border-width:3px 3px 0 0}
  .frame span::before{bottom:0;left:0;border-width:0 0 3px 3px}
  .frame span::after{bottom:0;right:0;border-width:0 3px 3px 0}
  .scanline{position:absolute;left:10px;right:10px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sl 2s ease-in-out infinite}
  @keyframes sl{0%{top:10px;opacity:1}90%{top:calc(100% - 12px);opacity:1}100%{top:calc(100% - 12px);opacity:0}}
  .scan-msg{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);padding:8px 16px;font-size:12px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.75);text-align:center}
  .actions{padding:12px 16px;display:flex;gap:10px}
  .lib-info{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);padding:6px 16px 4px}
  .btn{flex:1;padding:12px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-p{background:var(--accent);color:#0f0f0f}.btn-p:active{transform:scale(.97)}
  .btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-d{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .manual{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:none;flex-direction:column;gap:10px}
  .manual.on{display:flex}
  .lbl{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  input[type=text],input[type=number]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--accent)}
  .frow{display:flex;gap:10px}.frow>div{flex:1}
  .sheet-wrap{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;z-index:100}
  .sheet-wrap.on{display:flex}
  .sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 44px;border-top:1px solid var(--border);animation:su .25s ease}
  @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
  .sh-art{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);margin-bottom:4px}
  .sh-prod{font-size:13px;color:var(--muted);margin-bottom:24px}
  .qty-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .stepper{width:52px;height:52px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}
  .stepper:active{background:var(--border)}
  #qi{flex:1;text-align:center;font-size:36px;padding:10px}
  .list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .list-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .list-hdr-l{display:flex;align-items:center;gap:10px}
  .list-hdr span{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .badge{background:var(--accent);color:#0f0f0f;font-size:11px;font-weight:600;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px}
  .empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace}
  .empty div{font-size:32px;margin-bottom:10px}
  #ilist{max-height:320px;overflow-y:auto}
  .irow{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:12px;animation:fi .2s ease}
  @keyframes fi{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .irow:last-child{border-bottom:none}
  .inum{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);width:20px;flex-shrink:0}
  .iinfo{flex:1;min-width:0}
  .iart{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent2)}
  .iprod{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .isz{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);flex-shrink:0}
  .iqty{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);min-width:36px;text-align:right;flex-shrink:0}
  .idel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;flex-shrink:0;transition:color .15s}
  .idel:hover{color:var(--danger)}
  .exp-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--success);color:#0f0f0f;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;padding:10px 20px;border-radius:30px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <h1>LABEL_SCAN</h1>
  <span id="hcount">0 items</span>
</header>

<div class="main">

  <div class="card">
    <div class="card-hdr">
      <span>Camera Scanner</span>
      <div class="dot" id="dot"></div>
    </div>
    <div id="vc">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="cv"></canvas>
      <div class="overlay"><div class="frame"><span></span><div class="scanline"></div></div></div>
      <div class="scan-msg" id="smsg">Ready</div>
    </div>
    <div class="lib-info" id="libinfo">Initialising DataMatrix decoder…</div>
    <div class="actions">
      <button class="btn btn-p" id="scanbtn" onclick="toggleScanner()">📷 Start Scanning</button>
      <button class="btn btn-s" onclick="toggleManual()">Manual</button>
    </div>
  </div>

  <div class="manual" id="manual">
    <div>
      <div class="lbl">Paste raw barcode — or fill fields below</div>
      <input type="text" id="mraw" placeholder="010735003445504210TO-03750920423740918581-43" oninput="parseRaw()">
    </div>
    <div class="frow">
      <div><div class="lbl">Artikel Number</div><input type="text" id="mart" placeholder="8581-43"></div>
      <div><div class="lbl">Size EUR</div><input type="text" id="msz" placeholder="43"></div>
    </div>
    <div><div class="lbl">Product Name (optional)</div><input type="text" id="mprod" placeholder="Classic High Black"></div>
    <div><div class="lbl">Quantity (pairs)</div><input type="number" id="mqty" placeholder="40" min="1"></div>
    <button class="btn btn-p" onclick="addManual()">＋ Add Item</button>
  </div>

  <div class="list-wrap">
    <div class="list-hdr">
      <div class="list-hdr-l">
        <span>Scanned Items</span>
        <div class="badge" id="badge">0</div>
      </div>
      <button class="btn btn-d" style="flex:0;padding:6px 12px;font-size:12px" onclick="clearAll()">Clear</button>
    </div>
    <div id="ilist">
      <div class="empty" id="empty"><div>📦</div>Scan a label or use Manual Entry</div>
    </div>
    <div class="exp-bar">
      <button class="btn btn-s" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-p" onclick="exportXLSX()">Export Excel</button>
    </div>
  </div>

</div>

<div class="sheet-wrap" id="sw">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-art" id="sh-art">—</div>
    <div class="sh-prod" id="sh-prod">—</div>
    <div class="qty-row">
      <div class="stepper" onclick="adj(-1)">−</div>
      <input type="number" id="qi" value="1" min="1">
      <div class="stepper" onclick="adj(1)">+</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-s" onclick="cancelQty()">Cancel</button>
      <button class="btn btn-p" onclick="confirmQty()">Add to List</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Wait for ZXingWASM to load ─────────────────────────────────
let zxingReady = false;

window.addEventListener('load', async () => {
  const info = document.getElementById('libinfo');
  try {
    // ZXingWASM is loaded as IIFE, exposes ZXingWASM global
    // Override the locateFile so it finds the wasm next to this HTML
    ZXingWASM.setZXingModuleOverrides({
      locateFile: (path, prefix) => {
        if (path.endsWith('.wasm')) return 'zxing_reader.wasm';
        return prefix + path;
      }
    });
    // Warm up by reading a dummy blob
    await ZXingWASM.readBarcodesFromImageFile(
      new Blob([new Uint8Array([0])], {type:'image/png'}),
      { formats: ['DataMatrix'] }
    ).catch(() => {});
    zxingReady = true;
    info.textContent = '✓ DataMatrix decoder ready';
    info.style.color = 'var(--success)';
  } catch(e) {
    info.textContent = '⚠ Decoder error: ' + e.message + ' — use Manual Entry';
    info.style.color = 'var(--danger)';
  }
});

// ── GS1 Parser ─────────────────────────────────────────────────
function parseGS1(raw) {
  const r = { raw, artikel: null, size: null, product: null };
  if (!raw) return r;
  const s = raw.replace(/[\x1D\x1E\x04\x1C]/g, '');

  // AI 91 — Polyver company-internal field (contains artikel number)
  const m91 = s.match(/91([A-Za-z0-9][A-Za-z0-9\-\/]*)/);
  if (m91) r.artikel = m91[1];

  // AI 21 — serial number fallback
  if (!r.artikel) {
    const m21 = s.match(/21([A-Za-z0-9][A-Za-z0-9\-\/]*)/);
    if (m21) r.artikel = m21[1];
  }

  // Last token that looks like an artikel-size pair
  if (!r.artikel) {
    const mLast = s.match(/([A-Z0-9S]{3,}[\-\/]\d{2,5}[FfNn]?)$/i);
    if (mLast) r.artikel = mLast[1];
  }

  // Plain artikel number (no GS1 wrapping)
  if (!r.artikel && /^[A-Z0-9S]{3,}[\-\/]\w+$/i.test(s)) {
    r.artikel = s;
  }

  if (r.artikel) {
    r.size    = inferSize(r.artikel);
    r.product = lookupProduct(r.artikel);
  }
  return r;
}

function inferSize(a) {
  const m = a.match(/[-](\d+[\/]?\d*)[FfNn]?$/);
  return m ? m[1] : null;
}

function lookupProduct(a) {
  const map = {
    '8581':'Classic High Black','8580':'Classic High Black',
    '8550':'Classic High OD Green','8541':'Classic Low Black',
    '8440':'Classic Sport Mid Black','8250':'Classic 365 OD Green',
    '8280':'Classic 365 Black','8340':'Classic Sport Low B/W',
    '8380':'Classic Sport Low Black','1180':'Winter Junior Black',
    '01BC':'Winter Kids Black','S111BA':'Safety Premium Black',
    'S11BA':'Safety Premium Low Black',
  };
  for (const [k,v] of Object.entries(map)) {
    if (a.toUpperCase().startsWith(k)) return v;
  }
  return null;
}

// ── Camera ─────────────────────────────────────────────────────
let scanning = false, loopTimer = null, camStream = null;

function toggleScanner() {
  scanning ? stopCam() : startCam();
}

async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    const video = document.getElementById('video');
    video.srcObject = camStream;
    await video.play();
    document.getElementById('vc').classList.add('on');
    scanning = true;
    const btn = document.getElementById('scanbtn');
    btn.textContent = '⏹ Stop';
    btn.style.cssText = 'background:#ff4747;color:#fff;flex:1;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;padding:12px;';
    document.getElementById('dot').className = 'dot blink';
    document.getElementById('smsg').textContent = zxingReady
      ? 'Point label at camera…'
      : 'Decoder loading, please wait…';
    loop();
  } catch(e) {
    toast('Camera error: ' + e.message, true);
  }
}

function stopCam() {
  scanning = false;
  clearTimeout(loopTimer);
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const v = document.getElementById('video');
  v.srcObject = null;
  document.getElementById('vc').classList.remove('on');
  const btn = document.getElementById('scanbtn');
  btn.textContent = '📷 Start Scanning';
  btn.style.cssText = '';
  document.getElementById('dot').className = 'dot';
}

async function loop() {
  if (!scanning) return;

  if (zxingReady) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('cv');

    if (video.readyState >= 2) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(video, 0, 0);

      try {
        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
        const results = await ZXingWASM.readBarcodesFromImageFile(blob, {
          formats: ['DataMatrix', 'QRCode', 'Code128', 'EAN13'],
          tryHarder: true,
          tryRotate: true,
          tryInvert: true,
        });
        if (results && results.length > 0 && results[0].text) {
          onScan(results[0].text);
          return;
        }
      } catch(e) { /* keep looping */ }
    }
  }

  loopTimer = setTimeout(loop, 200);
}

let lastRaw = '', lastT = 0;
function onScan(raw) {
  if (raw === lastRaw && Date.now() - lastT < 3000) return;
  lastRaw = raw; lastT = Date.now();
  stopCam();
  const p = parseGS1(raw);
  if (!p.artikel) { toast('Scanned but could not read artikel number', true); return; }
  showSheet(p);
}

// ── Qty sheet ──────────────────────────────────────────────────
let pending = null;

function showSheet(p) {
  pending = p;
  document.getElementById('sh-art').textContent = p.artikel;
  document.getElementById('sh-prod').textContent =
    [p.product, p.size ? 'EUR ' + p.size : null].filter(Boolean).join(' · ') || '—';
  document.getElementById('qi').value = 1;
  document.getElementById('sw').classList.add('on');
  setTimeout(() => document.getElementById('qi').select(), 300);
}

function adj(d) {
  const i = document.getElementById('qi');
  i.value = Math.max(1, (parseInt(i.value) || 1) + d);
}

function confirmQty() {
  if (!pending) return;
  addItem({ ...pending, qty: parseInt(document.getElementById('qi').value) || 1 });
  pending = null;
  document.getElementById('sw').classList.remove('on');
  toast('✓ Added');
}

function cancelQty() {
  pending = null;
  document.getElementById('sw').classList.remove('on');
}

document.getElementById('sw').addEventListener('click', e => {
  if (e.target === document.getElementById('sw')) cancelQty();
});

// ── Manual entry ───────────────────────────────────────────────
function toggleManual() {
  document.getElementById('manual').classList.toggle('on');
}

function parseRaw() {
  const raw = document.getElementById('mraw').value.trim();
  if (raw.length < 4) return;
  const p = parseGS1(raw);
  if (p.artikel) document.getElementById('mart').value = p.artikel;
  if (p.size)    document.getElementById('msz').value  = p.size;
  if (p.product) document.getElementById('mprod').value = p.product;
}

function addManual() {
  const art = document.getElementById('mart').value.trim();
  if (!art) { toast('Artikel number required', true); return; }
  addItem({
    artikel: art,
    qty:     parseInt(document.getElementById('mqty').value) || 1,
    size:    document.getElementById('msz').value.trim() || inferSize(art),
    product: document.getElementById('mprod').value.trim() || lookupProduct(art),
  });
  ['mraw','mart','msz','mprod','mqty'].forEach(id => document.getElementById(id).value = '');
  toast('✓ Added');
}

// ── Items list ─────────────────────────────────────────────────
const items = [];

function addItem(item) { items.unshift(item); render(); }

function delItem(i) { items.splice(i, 1); render(); }

function clearAll() {
  if (!items.length) return;
  if (confirm('Clear all ' + items.length + ' items?')) { items.length = 0; render(); }
}

function render() {
  const list  = document.getElementById('ilist');
  document.getElementById('badge').textContent = items.length;
  document.getElementById('hcount').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');
  if (!items.length) {
    list.innerHTML = '';
    list.appendChild(document.getElementById('empty'));
    return;
  }
  list.innerHTML = items.map((it, i) => `
    <div class="irow">
      <div class="inum">${items.length - i}</div>
      <div class="iinfo">
        <div class="iart">${it.artikel}</div>
        <div class="iprod">${it.product || '—'}</div>
      </div>
      <div class="isz">${it.size ? 'EU&nbsp;' + it.size : ''}</div>
      <div class="iqty">${it.qty}</div>
      <button class="idel" onclick="delItem(${i})">✕</button>
    </div>
  `).join('');
}

// ── Export ─────────────────────────────────────────────────────
function exportCSV() {
  if (!items.length) { toast('Nothing to export', true); return; }
  const rows = [
    'Artikel Number,Size (EUR),Product Name,Quantity',
    ...items.map(i => `"${i.artikel}","${i.size||''}","${i.product||''}","${i.qty}"`)
  ].join('\n');
  dl(new Blob([rows], { type: 'text/csv' }), 'inventory_' + ds() + '.csv');
  toast('CSV saved');
}

function exportXLSX() {
  if (!items.length) { toast('Nothing to export', true); return; }
  const ws = XLSX.utils.aoa_to_sheet([
    ['Artikel Number', 'Size (EUR)', 'Product Name', 'Quantity'],
    ...items.map(i => [i.artikel, i.size || '', i.product || '', i.qty])
  ]);
  ws['!cols'] = [{ wch: 18 }, { wch: 12 }, { wch: 28 }, { wch: 12 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, 'inventory_' + ds() + '.xlsx');
  toast('Excel saved');
}

function dl(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}
function ds() { return new Date().toISOString().slice(0, 10).replace(/-/g, ''); }

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--danger)' : 'var(--success)';
  t.style.color = err ? '#fff' : '#0f0f0f';
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}
</script>
</body>
</html>
